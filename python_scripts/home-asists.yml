version: '3.8'

services:
  # Home Assistant - основной мозг
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./homeassistant/config:/config
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=Europe/Moscow
    # Порт 8123 доступен через network_mode host

  whisper:
    image: rhasspy/wyoming-whisper
    container_name: wyoming-whisper
    restart: unless-stopped
    ports:
      - "10300:10300"
    command: --model tiny-int8 --language ru

  piper:
    image: rhasspy/wyoming-piper
    container_name: wyoming-piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    command: --voice ru_RU-irina-medium

  satellite:
    image: lunyaadev/rhasspy-wyoming-satellite
    container_name: wyoming-satellite
    restart: unless-stopped
    network_mode: host
    volumes:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    command:
      - --uri
      - tcp://0.0.0.0:10700
      - --name
      - pc-satellite
      - --mic-command
      - "cat /dev/null"
      - --snd-command
      - "cat > /dev/null"
